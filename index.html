<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bedevere Wise — SAS, SPSS, Stata & Parquet viewer in your browser</title>
    <meta
      name="description"
      content="Drop a .sas7bdat, .sav, .dta, .xpt, .parquet, or .csv into your browser and query it with SQL. No install, no upload — runs locally via DuckDB-WASM."
    />
    <meta name="keywords" content="sas viewer, sas7bdat viewer, spss viewer, sav viewer, stata viewer, dta viewer, xpt viewer, parquet viewer, csv sql, duckdb, browser sql, local-first, biostatistics" />
    <link rel="canonical" href="https://bedeverewise.app/" />
    <link rel="icon" type="image/x-icon" href="/duck.ico" />

    <!-- Open Graph / social-share cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bedevere Wise" />
    <meta property="og:title" content="Bedevere Wise — SAS, SPSS, Stata & Parquet viewer in your browser" />
    <meta
      property="og:description"
      content="Drop a .sas7bdat, .sav, .dta, .xpt, .parquet, or .csv into your browser and query it with SQL. No install, no upload — runs locally via DuckDB-WASM."
    />
    <meta property="og:url" content="https://bedeverewise.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bedevere Wise — SAS, SPSS, Stata & Parquet viewer in your browser" />
    <meta
      name="twitter:description"
      content="Drop a .sas7bdat, .sav, .dta, .xpt, .parquet, or .csv into your browser and query it with SQL. No install, no upload — runs locally via DuckDB-WASM."
    />

    <!-- Rich result hint for Google search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Bedevere Wise",
        "description": "Open SAS, SPSS, Stata, Parquet, and Excel files in your browser. Query them with SQL — no install, no upload.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://bedeverewise.app/",
        "author": { "@type": "Person", "name": "Massimo Meneghello" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "license": "https://opensource.org/licenses/MIT"
      }
    </script>
    <style>
      /* Reset and base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 13px;
        line-height: 1.4;
      }

      body {
        background-color: #1e1e1e;
        color: #cccccc;
      }

      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Loading screen */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #1e1e1e;
        color: #cccccc;
        font-size: 14px;
      }

      .loading::after {
        content: "";
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 2px solid #3c3c3c;
        border-top: 2px solid #007acc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Ensure proper rendering */
      .bedevere-app {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading">Loading Bedevere Wise...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
