name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # GH Pages serves the project at github.io/bedevere-wise/ — vite needs
      # to know the prefix at build time. Cloudflare Pages keeps BASE_PATH
      # at "/" via its own env config (see DEPLOY.md).
      - run: bun run build
        env:
          BASE_PATH: /bedevere-wise/
          # Optional: set the feedback worker URL if you want GH Pages
          # builds to talk to the same worker as the CF Pages deploy.
          # VITE_FEEDBACK_URL: https://bedevere-feedback.YOUR-SUBDOMAIN.workers.dev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
