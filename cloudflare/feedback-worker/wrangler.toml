# Cloudflare Worker config for the Bedevere Wise feedback endpoint.
#
# This is a separately-deployed sibling of the main app — the app is a
# static SPA on Pages, this is a small POST receiver backed by D1.
#
# First-time setup (run from this directory):
#   bun install
#   bunx wrangler login
#   bunx wrangler d1 create bedevere-feedback
#   # paste the printed `database_id` into the binding below, then:
#   bunx wrangler d1 execute bedevere-feedback --file=./schema.sql --remote
#   bunx wrangler secret put FEEDBACK_ADMIN_SECRET   # generate a random string
#   bunx wrangler secret put ALLOWED_ORIGIN          # e.g. https://bedevere.example.com
#   bunx wrangler deploy

name = "bedevere-feedback"
main = "src/index.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# Routes: omit `routes` to use the default *.workers.dev URL (free).
# To attach a custom domain (e.g. api.bedevere.example.com) add a routes
# block here AND a CNAME in the Cloudflare DNS dashboard pointing at the
# worker, with proxying enabled.

[[d1_databases]]
binding = "DB"
database_name = "bedevere-feedback"
database_id = "5a559e6c-70e7-4b73-9390-167d5ede91d1"

# Observability: enable Cloudflare's built-in request tail without paying
# extra. See dashboard → Workers → Logs.
[observability]
enabled = true
